<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Grove</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "e1d1cb65-fbf0-4a1f-a9d4-dcc90642cb28",

      serviceWorkerPath: "OneSignalSDKWorker.js",
      serviceWorkerUpdaterPath: "OneSignalSDKUpdaterWorker.js",
    });
  });
  </script>

</head>

<body>
<!-- NEW Onboarding stuff -->
<div id="onboarding">
  <div class="onboard-box">
    <h2>Enter the Grove </h2>
    <p>
      Install the app and enable alerts to receive live camp events and quests.
    </p>

    <button id="installBtn">Install App</button>
    <button id="notifyBtn">Enable Notifications</button>

    <div id="iosHint" class="hint">
      On iPhone: Tap <b>Share</b> → <b>Add to Home Screen</b>
    </div>

    <!-- <button id="enterBtn">Enter</button> -->
    <input id="codeInput" placeholder="Enter" />
    <button id="verifyBtn">Verify</button>
  </div>
</div>

<div id="stars"></div>
<div id="stars2"></div>
<div id="stars3"></div>

<!-- <div id="login-screen">
  <input type="email" id="email-input" placeholder="Enter email">
  <button id="login-btn">Enter Grove</button>
</div> -->

<div id="class-select-wrapper">
  <div id="class-select">

    <div class="class-btn-wrap" data-desc="KNIGHT: Heavy armour and damage.">
      <button data-class="knight" class="deck-btn">
        <img src="cards/knight-icon.webp" alt="Knight Deck">
      </button>
    </div>

    <div class="class-btn-wrap" data-desc="MAGE: Constant pressure, but fragile.">
      <button data-class="mage" class="deck-btn">
        <img src="cards/mage-icon.webp" alt="Mage Deck">
      </button>
    </div>

    <div class="class-btn-wrap" data-desc="ROGUE: Control the fight, if you're skilled.">
      <button data-class="rogue" class="deck-btn">
        <img src="cards/rogue-icon.webp" alt="Rogue Deck">
      </button>
    </div>

  </div>
</div>

<h1>Who are You?</h1>

<div id="card-library"></div>

<div id="overlay">
  <div class="overlay-card">
    <img id="overlay-img">
    <div class="glint"></div>
  </div>
</div>

<!-- <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> -->
<script src="script.js"></script>
</body>
</html>
